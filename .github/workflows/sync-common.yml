name: Sync Common

on:
  workflow_dispatch:
    inputs:
      common_tag:
        description: 'New agent-common Tag'
        required: true
        type: string

jobs:
  sync:
    uses: agent-hub-org/deploy/.github/workflows/reusable-sync-common.yml@main
    with:
      agent_name: agent-news
      common_tag: ${{ inputs.common_tag }}
    secrets:
      ORG_PAT: ${{ secrets.ORG_PAT }}
